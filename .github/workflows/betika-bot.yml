name: Betika bot

on:
  # Paused: disable scheduled runs. This workflow can only be run manually.
  workflow_dispatch:
    inputs:
      stake:
        description: "Stake (KES)"
        required: false
        default: "2"
      count:
        description: "Number of games to pick"
        required: false
        default: "20"
      max_odds:
        description: "Maximum odd per pick"
        required: false
        default: "1.40"
      min_odds:
        description: "Minimum odd per pick"
        required: false
        default: "1.01"
      execute:
        description: "Place bet (true/false)"
        required: false
        default: "false"
      headless:
        description: "Run browser headless (true/false)"
        required: false
        default: "true"
      manual_login_wait:
        description: "Seconds to allow manual login (headed runs only)"
        required: false
        default: "0"
      profile_dir:
        description: "Chrome profile dir (persists session on self-hosted runners)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: betika-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ${{ vars.BETIKA_RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 25
    env:
      BETIKA_USERNAME: ${{ secrets.BETIKA_USERNAME }}
      BETIKA_PASSWORD: ${{ secrets.BETIKA_PASSWORD }}
      BETIKA_STAKE: ${{ github.event.inputs.stake || '2' }}
      BETIKA_COUNT: ${{ github.event.inputs.count || '20' }}
      BETIKA_MIN_ODDS: ${{ github.event.inputs.min_odds || '1.01' }}
      BETIKA_MAX_ODDS: ${{ github.event.inputs.max_odds || '1.40' }}
      BETIKA_TIMEOUT: "45"
      BETIKA_MAX_SCROLLS: "60"
      BETIKA_EXECUTE: ${{ github.event.inputs.execute || secrets.BETIKA_EXECUTE || 'false' }}
      BETIKA_HEADLESS: ${{ github.event.inputs.headless || vars.BETIKA_HEADLESS || 'true' }}
      BETIKA_MANUAL_LOGIN_WAIT: ${{ github.event.inputs.manual_login_wait || vars.BETIKA_MANUAL_LOGIN_WAIT || '0' }}
      BETIKA_PROFILE_DIR: ${{ github.event.inputs.profile_dir || vars.BETIKA_PROFILE_DIR || '' }}
      BETIKA_CHROME_BINARY: ${{ vars.BETIKA_CHROME_BINARY || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Chrome binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${BETIKA_CHROME_BINARY:-}" ]]; then
            echo "BETIKA_CHROME_BINARY is already set to: ${BETIKA_CHROME_BINARY}"
            exit 0
          fi

          candidates=(
            /usr/bin/google-chrome-stable
            /usr/bin/google-chrome
            /usr/bin/chromium-browser
            /usr/bin/chromium
            /snap/bin/chromium
          )
          for path in "${candidates[@]}"; do
            if [[ -x "${path}" ]]; then
              echo "Detected chrome binary: ${path}"
              echo "BETIKA_CHROME_BINARY=${path}" >> "${GITHUB_ENV}"
              exit 0
            fi
          done

          echo "Could not find a Chrome/Chromium binary on this runner." >&2
          echo "Try setting repo variable BETIKA_CHROME_BINARY to the correct path or use a self-hosted runner." >&2
          exit 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${BETIKA_USERNAME:-}" || -z "${BETIKA_PASSWORD:-}" ]]; then
            echo "Missing secrets: BETIKA_USERNAME and/or BETIKA_PASSWORD" >&2
            exit 2
          fi

          if [[ -z "${BETIKA_PROFILE_DIR:-}" ]]; then
            BETIKA_PROFILE_DIR="${HOME}/.cache/betika-bot/chrome-profile"
          fi

          args=(--debug-login)
          if [[ "${BETIKA_HEADLESS,,}" == "true" ]]; then
            args+=(--headless)
          fi
          if [[ -n "${BETIKA_MANUAL_LOGIN_WAIT:-}" && "${BETIKA_MANUAL_LOGIN_WAIT}" != "0" ]]; then
            args+=(--manual-login-wait "${BETIKA_MANUAL_LOGIN_WAIT}")
          fi
          if [[ -n "${BETIKA_PROFILE_DIR:-}" ]]; then
            args+=(--profile-dir "${BETIKA_PROFILE_DIR}")
          fi
          if [[ -n "${BETIKA_CHROME_BINARY:-}" ]]; then
            args+=(--chrome-binary "${BETIKA_CHROME_BINARY}")
          fi
          if [[ "${BETIKA_EXECUTE,,}" == "true" ]]; then
            args+=(--execute)
          fi

          python betika.py "${args[@]}"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug_artifacts
          path: debug_artifacts
          if-no-files-found: ignore
